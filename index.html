<!DOCTYPE html>
<html>
<head>
    <title>Marks Battle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 90%;
            max-width: 500px;
        }

        th, td {
            border: 1px solid #334155;
            padding: 10px;
        }

        th {
            background: #1e293b;
        }

        input {
            width: 60px;
            padding: 6px;
            text-align: center;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            transition: all 0.4s ease;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 26px;
            font-weight: bold;
        }

        #warning {
            color: #f87171;
            margin-top: 10px;
        }

        /* ✅ FIXED WARNING BOX */
        #bottomWarning {
            margin: 25px auto;
            padding: 12px 20px;
            background: #7f1d1d;
            border-radius: 10px;
            font-weight: bold;
            color: #fff;
            width: fit-content;
            max-width: 90%;
            
        }

        .winnerGlow {
            animation: glow 1s infinite alternate;
            color: #22c55e;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #22c55e; }
            to { text-shadow: 0 0 25px #22c55e, 0 0 40px #22c55e; }
        }

        .pulse {
            animation: pulseAnim 0.5s ease;
        }

        @keyframes pulseAnim {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }

        #overlayText {
            font-size: 40px;
            font-weight: bold;
            color: #22c55e;
            animation: glow 1s infinite alternate;
        }

        #overlay button {
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: black;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🔥 Marks Battle 🔥</h1>
<h2>HEAM VS LP</h2>

<table>
    <tr>
        <th>Subject</th>
        <th>HEAM</th>
        <th>LP</th>
    </tr>
    <tbody id="tableBody"></tbody>
</table>

<button onclick="calculate()">Calculate</button>

<div id="warning"></div>
<div id="result"></div>
<div id="diff"></div>
<div id="subjectScore"></div>

<div id="bottomWarning"></div>

<div id="overlay">
    <div id="overlayText"></div>
    <button onclick="closeOverlay()">Close</button>
</div>

<audio id="winSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
    const subjects = ["Tamil","English","Maths","Physics","DPCO","OOPS","BEEE"];

    for (let i = 0; i < subjects.length; i++) {

        let yVal = "";
        let fVal = "";

        if (i === 3) {
            yVal = 49;
            fVal = 48;
        }

        document.getElementById("tableBody").innerHTML += `
            <tr>
                <td>${subjects[i]}</td>
                <td><input type="number" id="y${i}" value="${yVal}"></td>
                <td><input type="number" id="f${i}" value="${fVal}"></td>
            </tr>
        `;
    }

    function calculate() {
        let t1 = 0, t2 = 0;
        let score1 = 0, score2 = 0;

        let msg = "⚠️ Marks are not filled fully, so calculation is not possible";

        document.getElementById("warning").innerText = "";

        let bw = document.getElementById("bottomWarning");
        bw.innerText = "";
        bw.style.display = "none";

        let resultDiv = document.getElementById("result");
        resultDiv.classList.remove("winnerGlow");

        for (let i = 0; i < subjects.length; i++) {
            let yInput = document.getElementById("y"+i);
            let fInput = document.getElementById("f"+i);

            let yVal = yInput.value;
            let fVal = fInput.value;

            yInput.style.background = "white";
            fInput.style.background = "white";

            if (yVal === "" || fVal === "") {
                document.getElementById("warning").innerText = msg;
                bw.innerText = msg;
                bw.style.display = "block";
                return;
            }

            let y = Number(yVal);
            let f = Number(fVal);

            t1 += y;
            t2 += f;

            if (y > f) {
                score1++;
                animateCell(yInput, "#22c55e");
                animateCell(fInput, "#ef4444");
            }
            else if (f > y) {
                score2++;
                animateCell(fInput, "#22c55e");
                animateCell(yInput, "#ef4444");
            }
            else {
                animateCell(yInput, "#facc15");
                animateCell(fInput, "#facc15");
            }
        }

        let winner = t1 > t2 ? "🏆 HEAM WINS!" :
                     t2 > t1 ? "🏆 LP WINS!" : "🤝 DRAW!";

        resultDiv.innerText = winner;
        resultDiv.classList.add("winnerGlow");

        document.getElementById("diff").innerText =
            "Difference: " + Math.abs(t1 - t2);

        document.getElementById("subjectScore").innerText =
            `Subject Score → HEAM: ${score1} | LP: ${score2}`;

        document.getElementById("winSound").play();
        showOverlay(winner);
    }

    function animateCell(input, color) {
        input.style.background = color;
        input.classList.add("pulse");
        setTimeout(() => input.classList.remove("pulse"), 500);
    }

    function showOverlay(text) {
        document.getElementById("overlayText").innerText = text;
        document.getElementById("overlay").style.display = "flex";
    }

    function closeOverlay() {
        document.getElementById("overlay").style.display = "none";
    }
</script>

</body>
</html>
